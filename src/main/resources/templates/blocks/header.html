<div th:fragment="header">
    <header>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <div class="pasekheadera">
            <div class="logo">
                <a href="/">LubimyCzytać</a>
            </div>

            <div class="burger-menu" id="burgerMenu">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <nav class="menu" id="mainMenu">
                <a href="/">Strona główna</a>
                <a href="/Katalog">Katalog książek</a>
                <a href="/MojeKsiazki">Moje książki</a>
                <a href="/DodanieKsiazek">Dodaj książkę</a>
                <li th:if="${session.loggedUser != null and session.loggedUser.isAdmin()}">
                    <a href="/admin/panel">Panel Admina</a>
                </li>
            </nav>

            <div class="panelprofilu">
                <div th:if="${loggedUser != null}" class="profil-zalogowany">
                    <div class="profilinfo">
                        <div class="avatarprofilu">
                            <img th:if="${loggedUser.avatar != null and loggedUser.avatar.contains('http')}"
                                 th:src="${loggedUser.avatar}"
                                 alt="Avatar">
                            <span th:unless="${loggedUser.avatar != null and loggedUser.avatar.contains('http')}"
                                  th:utext="'<i class=&quot;fa-solid fa-user&quot;></i>'"></span>
                        </div>
                        <div class="nazwaprofilu">
                            <span th:text="${loggedUser.username}">Profil</span>
                        </div>
                        <div class="dropdown-arrow">▼</div>
                    </div>
                    <div class="dropdown-menu">
                        <div class="dropdown-header">
                            <div class="user-name" th:text="${loggedUser.username}"></div>
                            <div class="user-email" th:text="${loggedUser.email}"></div>
                        </div>
                        <div class="statystyki-dropdown">
                            <span class="stats-title">Twoje statystyki</span>
                            <div class="stats-row">
                                <div class="stats-item">
                                    <span class="stats-label">Dodane książki:</span>
                                    <span class="stats-value" id="dodaneStatHeader" th:text="${loggedUser.dodaneKsiazki}">0</span>
                                </div>
                                <div class="stats-item">
                                    <span class="stats-label">Ulubione książki:</span>
                                    <span class="stats-value" id="ulubioneStatHeader" th:text="0">0</span>
                                </div>
                            </div>
                        </div>
                        <a href="/Profil" class="btn-profil">Przejdź do profilu</a>
                        <a href="/Wyloguj" class="btn-logout">Wyloguj się</a>
                    </div>
                </div>

                <div th:if="${loggedUser == null}" class="profil-niezalogowany">
                    <a href="/Logowanie" class="btn-login">Zaloguj</a>
                    <a href="/Rejestracja" class="btn-register">Zarejestruj</a>
                </div>
            </div>
        </div>
    </header>

    <script>
        function refreshHeaderStats() {
    fetch('/api/user/stats')
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                const ulubioneHeader = document.getElementById('ulubioneStatHeader');
                if (ulubioneHeader) {
                    ulubioneHeader.textContent = data.ulubione || 0;
                }
                const dodaneHeader = document.getElementById('dodaneStatHeader');
                if (dodaneHeader) {
                    dodaneHeader.textContent = data.dodaneKsiazki || 0;
                }
            }
        })
        .catch(error => console.error('Blad:', error));
}

        setInterval(refreshHeaderStats, 5000);
        document.addEventListener('DOMContentLoaded', function() {
            refreshHeaderStats();

            const burgerMenu = document.getElementById('burgerMenu');
            const mainMenu = document.getElementById('mainMenu');

            if (burgerMenu && mainMenu) {
                burgerMenu.addEventListener('click', function() {
                    mainMenu.classList.toggle('active');
                    burgerMenu.classList.toggle('active');
                });
            }

            const profilZalogowany = document.querySelector('.profil-zalogowany');
            const dropdownMenu = document.querySelector('.dropdown-menu');

            if (profilZalogowany && dropdownMenu) {
                profilZalogowany.addEventListener('click', function(e) {
                    e.stopPropagation();
                    dropdownMenu.classList.toggle('show');
                });

                document.addEventListener('click', function() {
                    dropdownMenu.classList.remove('show');
                });
            }
        });
    </script>
</div>
