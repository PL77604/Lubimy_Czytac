<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <title>Lubimy czytać</title>
</head>
<script th:src="@{/js/script.js}"></script>
<body>
<th:block th:replace="blocks/header :: header"></th:block>
    <section class="baner">
        <img th:src="@{/images/ksiazkizielone.png}" alt="Książki">
    </section>
    <main>
        <section class="ramka animacja">
        <h1>Lubimy czytać</h1>
        <p>Witamy na naszej stronie internetowej. Strona została ztworzona przez Tsyhanenka Oleksandra (Pl77316)
            i Arsen Medvid (Pl77604). Strona pozwala dodawać różne książki, shukać ich i czytać w katalogu.
        </p>
        </section>
        <section class="gatunki-index animacja">
            <a href="/Inne" class="gatunek-duzy gatunek-karta">
                <img th:src="@{/images/inne.png}" alt="Inne">
                <span>Inne</span>
            </a>
            <div class="gatunki-prawa">
                <a href="/Kryminal" class="gatunek-szeroki gatunek-karta">
                    <img th:src="@{/images/criminal.png}" alt="Kryminały">
                    <span>Kryminały</span>
                </a>
                <div class="gatunki-male">
                    <a href="/Romantyka" class="gatunek-maly gatunek-karta">
                        <img th:src="@{/images/romantic.png}" alt="Romantyka">
                        <span>Romantyka</span>
                    </a>
                    <a href="/Horrory" class="gatunek-maly gatunek-karta">
                        <img th:src="@{/images/horror.png}" alt="Horrory">
                        <span>Horrory</span>
                    </a>
                </div>
            </div>
        </section>
    </main>
<div th:insert="blocks/footer :: footer"></div>
<div class="menu-overlay" id="menuOverlay"></div>
</body>
</html>
