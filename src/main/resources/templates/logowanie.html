<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/logowanie.css}">
    <title>Logowanie</title>
</head>
<body>
    <header th:insert="blocks/header :: header"></header>
    <main>
        <section class="ramkalogowanie">
        <h1 class="tytullogowanie">Logowanie</h1>
        <p class="opislogowanie">Zaloguj do naszej aplikacji</p>
        </section>
        <form class="formalogowanie">
            <label class="etykietalogowanie" for="email">Adres e-mail:</label>
            <input class="inputlogowanie" type="email" id="email" name="email">

            <label class="etykietalogowanie" for="haslo">Hasło:</label>
            <input class="inputlogowanie" type="password" id="haslo" name="haslo">

            <button class="przycisklogowanie" type="submit">Zaloguj się</button>
        </form>
    </main>
    <div th:insert="blocks/footer :: footer"></div>
</body>
</html>
