<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/logowanie.css}">
    <title>Logowanie</title>
</head>
<body>
<th:block th:replace="blocks/header :: header"></th:block>
<main>
    <div th:if="${error}" class="error-message" style="max-width:700px; margin:0 auto 20px auto; background:#ffe0e0; border:1px solid #ff0000; padding:10px; border-radius:8px; color:#ff0000; text-align:center;">
        <span th:text="${error}"></span>
    </div>

    <form class="formalogowanie" method="POST" action="/Logowanie">
        <label class="etykietalogowanie" for="email">Adres e-mail:</label>
        <input class="inputlogowanie" type="email" id="email" name="email" required>

        <label class="etykietalogowanie" for="haslo">Hasło:</label>
        <input class="inputlogowanie" type="password" id="haslo" name="haslo" required>

        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 25px;">
            <input type="checkbox" id="rememberMe" name="rememberMe" value="true" style="width: 18px; height: 18px; cursor: pointer;">
            <label for="rememberMe" style="color: #363D33; cursor: pointer; font-weight: normal;">Zapamiętaj mnie</label>
        </div>

        <button class="przycisklogowanie" type="submit">Zaloguj się</button>
    </form>
</main>
<div th:insert="blocks/footer :: footer"></div>
</body>
</html>
