<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/dodanie.css}">
    <link rel="stylesheet" th:href="@{/css/gatunki.css}">
    <title>Dodanie książek</title>
</head>
<script th:src="@{/js/script.js}"></script>
<script th:src="@{/js/book-form.js}"></script>
<body>
<th:block th:replace="blocks/header :: header"></th:block>
<main>
    <section class="ramkadodanie animacja">
        <h1 class="tytuldodanie">Dodanie książki</h1>
        <p class="opisdodanie">
            Tutaj możesz dodać książkę napisaną przez siebie albo znalezioną przez ciebie.
            Wypełnij formularz i wybierz najbardziej pasujące tagi.
        </p>
    </section>

    <section class="ramkadodanie animacja">
        <h2 class="tytulformularz">Formularz dodawania książki</h2>

        <form id="bookForm" class="formadodanie" enctype="multipart/form-data">
            <label class="etykietadodanie" for="okladka">Dodaj obraz książki:</label>
            <input class="inputdodanie" type="file" id="okladka" name="okladka" accept="image/*">

            <label class="etykietadodanie" for="link">Link do książki:</label>
            <input class="inputdodanie" type="url" id="link" name="link" placeholder="Np. https://example.com/ksiazka">

            <label class="etykietadodanie" for="tytul">Tytuł książki:</label>
            <input class="inputdodanie" type="text" id="tytul" name="tytul" required>

            <label class="etykietadodanie" for="autor">Autor:</label>
            <input class="inputdodanie" type="text" id="autor" name="autor" required>

            <label class="etykietadodanie" for="opis">Opis książki:</label>
            <textarea class="areadodanie" id="opis" name="opis" rows="5"></textarea>

            <button class="przyciskdodanie" type="button" onclick="toggleGenres()">Wybierz gatunki</button>
            <div class="gatunki-katalog" id="genresPanel" style="display: none;">
                <h3 class="tytulgatunki">Wybierz gatunki książki</h3>
                <div class="lista-gatunkow">
                    <label><input type="checkbox" name="gatunki" value="fantastyka"> Fantastyka</label>
                    <label><input type="checkbox" name="gatunki" value="kryminal"> Kryminał</label>
                    <label><input type="checkbox" name="gatunki" value="romans"> Romans</label>
                    <label><input type="checkbox" name="gatunki" value="horror"> Horror</label>
                    <label><input type="checkbox" name="gatunki" value="thriller"> Thriller</label>
                    <label><input type="checkbox" name="gatunki" value="przygodowa"> Przygodowa</label>
                    <label><input type="checkbox" name="gatunki" value="historyczna"> Historyczna</label>
                    <label><input type="checkbox" name="gatunki" value="biografia"> Biografia</label>
                    <label><input type="checkbox" name="gatunki" value="popularnonaukowa"> Popularnonaukowa</label>
                    <label><input type="checkbox" name="gatunki" value="science-fiction"> Science fiction</label>
                    <label><input type="checkbox" name="gatunki" value="dla-dzieci"> Dla dzieci</label>
                    <label><input type="checkbox" name="gatunki" value="mlodziezowa"> Młodzieżowa</label>
                    <label><input type="checkbox" name="gatunki" value="poezja"> Poezja</label>
                    <label><input type="checkbox" name="gatunki" value="dramat"> Dramat</label>
                    <label><input type="checkbox" name="gatunki" value="komiks"> Komiks</label>
                </div>
            </div>

            <div id="formMessage" style="display:none; padding: 10px; margin: 10px 0; border-radius: 5px;"></div>

            <button class="przyciskdodanie" type="submit">Dodaj książkę</button>
        </form>
    </section>
</main>
<div th:insert="blocks/footer :: footer"></div>
<div class="menu-overlay" id="menuOverlay"></div>
</body>
</html>
