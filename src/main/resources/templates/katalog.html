<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/katalog.css}">
    <link rel="stylesheet" th:href="@{/css/gatunki.css}">
    <title>Katalog książek</title>
</head>
<script th:src="@{/js/script.js}"></script>
<body>
<th:block th:replace="blocks/header :: header"></th:block>
    <main  class="glowna">
        <section class="ramkakatalog animacja">
        <h1 class="tytulkatalog">Katalog książek</h1>
        <p class="opiskatalog">
            Tutaj znajduje się nasz katalog książek na każdy smak. Możesz wyszukiwać książki po tytule
            albo wybrać odpowiedni tag.
        </p>
        </section>
        <section  class="ramkakatalog animacja">
            <h2 class="tytulszukaj">Wyszukiwanie książek</h2>

            <form class="formakatalog">
                <label class="etykietakatalog" for="szukaj">Wpisz nazwę książki:</label>
                <input class="inputkatalog" type="text" id="szukaj" name="szukaj" placeholder="Np. Wiedźmin">
                <button class="przyciskkatalog" type="button" onclick="document.querySelector('.gatunki-katalog').classList.toggle('pokaz-gatunki')">Wybierz gatunek</button>
                <div class="gatunki-katalog">
                    <h3 class="tytulgatunki">Wybierz gatunek książki</h3>
                    <div class="lista-gatunkow">
                        <label><input type="checkbox" name="gatunek" value="fantastyka"> Fantastyka</label>
                        <label><input type="checkbox" name="gatunek" value="kryminal"> Kryminał</label>
                        <label><input type="checkbox" name="gatunek" value="romans"> Romans</label>
                        <label><input type="checkbox" name="gatunek" value="horror"> Horror</label>
                        <label><input type="checkbox" name="gatunek" value="thriller"> Thriller</label>
                        <label><input type="checkbox" name="gatunek" value="przygodowa"> Przygodowa</label>
                        <label><input type="checkbox" name="gatunek" value="historyczna"> Historyczna</label>
                        <label><input type="checkbox" name="gatunek" value="biografia"> Biografia</label>
                        <label><input type="checkbox" name="gatunek" value="popularnonaukowa"> Popularnonaukowa</label>
                        <label><input type="checkbox" name="gatunek" value="science-fiction"> Science fiction</label>
                        <label><input type="checkbox" name="gatunek" value="dla-dzieci"> Dla dzieci</label>
                        <label><input type="checkbox" name="gatunek" value="mlodziezowa"> Młodzieżowa</label>
                        <label><input type="checkbox" name="gatunek" value="poezja"> Poezja</label>
                        <label><input type="checkbox" name="gatunek" value="dramat"> Dramat</label>
                        <label><input type="checkbox" name="gatunek" value="komiks"> Komiks</label>
                    </div>
                </div>
                <button class="przyciskkatalog" type="submit">Szukaj</button>
            </form>
        </section>
    </main>
<div th:insert="blocks/footer :: footer"></div>
<div class="menu-overlay" id="menuOverlay"></div>
</body>
</html>
