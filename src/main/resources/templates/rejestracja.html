<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/rejestracja.css}">
    <title>Rejestracja</title>
</head>
<body>
<th:block th:replace="blocks/header :: header"></th:block>
<main>
    <section class="ramkarejestracja animacja">
        <h1 class="tytulrejestracja">Rejestracja</h1>
        <p class="opisrejestracja">Zarejestruj się do naszej aplikacji</p>
    </section>

    <div th:if="${error}" class="error-message" style="max-width:700px; margin:0 auto 20px auto; background:#ffe0e0; border:1px solid #ff0000; padding:10px; border-radius:8px; color:#ff0000; text-align:center;">
        <span th:text="${error}"></span>
    </div>

    <form class="formarejestracja" method="POST" action="/Rejestracja">
        <label class="etykietarejestracja" for="email">Adres e-mail:</label>
        <input class="inputrejestracja" type="email" id="email" name="email" required>

        <label class="etykietarejestracja" for="haslo">Hasło:</label>
        <input class="inputrejestracja" type="password" id="haslo" name="haslo" required>

        <label class="etykietarejestracja" for="powtorzHaslo">Powtórz hasło:</label>
        <input class="inputrejestracja" type="password" id="powtorzHaslo" name="powtorzHaslo" required>

        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 25px;">
            <input type="checkbox" id="rememberMe" name="rememberMe" value="true" style="width: 18px; height: 18px; cursor: pointer;">
            <label for="rememberMe" style="color: #363D33; cursor: pointer; font-weight: normal;">Zapamiętaj mnie</label>
        </div>

        <button class="przyciskrejestracja" type="submit">Zarejestruj się</button>
    </form>
</main>
<div th:insert="blocks/footer :: footer"></div>
</body>
</html>
