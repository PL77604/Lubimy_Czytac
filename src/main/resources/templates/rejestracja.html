<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/rejestracja.css}">
    <title>Rejestracja</title>
</head>
<body>
    <header th:insert="blocks/header :: header"></header>
     <main>
        <section class="ramkarejestracja">
        <h1 class="tytulrejestracja">Rejestracja</h1>
        <p class="opisrejestracja">Zarejestruj się do naszej aplikacji</p>
        </section>

        <form class="formarejestracja">
            <label class="etykietarejestracja" for="imie">Imię:</label>
            <input class="inputrejestracja" type="text" id="imie" name="imie">

            <label class="etykietarejestracja" for="email">Adres e-mail:</label>
            <input class="inputrejestracja" type="email" id="email" name="email">

            <label class="etykietarejestracja" for="telefon">Numer telefonu:</label>
            <input class="inputrejestracja" type="tel" id="telefon" name="telefon">

            <button class="przyciskrejestracja" type="submit">Zarejestruj się</button>
        </form>
    </main>
    <div th:insert="blocks/footer :: footer"></div>
</body>
</html>
