<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Lubimy_czytac_css/global.css">
    <link rel="stylesheet" href="../Lubimy_czytac_css/katalog.css">
    <title>Katalog książek</title>
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Strona tytulowa</a>
            <a href="katalog.html">Katalog książek</a>
            <a href="mojeksiążki.html">Moje książki</a>
            <a href="dodanie.html">Dodanie książek</a>
            <a href="rejestracja.html">Rejestracja</a>
            <a href="logowanie.html">Logowanie</a>
        </nav>
    </header>
    <main  class="glowna">
        <section class="ramkakatalog">
        <h1 class="tytulkatalog">Katalog książek</h1>
        <p class="opiskatalog">
            Tutaj znajduje się nasz katalog książek na każdy smak. Możesz wyszukiwać książki po tytule
            albo wybrać odpowiedni tag.
        </p>
        </section>
        <section  class="ramkakatalog">
            <h2 class="tytulszukaj">Wyszukiwanie książek</h2>

            <form  class="formakatalog">
                <label class="etykietakatalog" for="szukaj">Wpisz nazwę książki:</label>
                <input class="inputkatalog" type="text" id="szukaj" name="szukaj" placeholder="Np. Wiedźmin">

                <button class="przyciskkatalog" type="submit">Szukaj</button>
            </form>
        </section>
    </main>
    <footer>
    <p>© 2026 Lubimy czytać, Tsyhanenko Oleksandr, Arsen Medvid</p>
    </footer>
